<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Standing order: this is hosted on a public free GitHub Pages repo,
       so we ask search engines not to index it. The robots.txt at the
       Pages root is the authoritative copy; this meta is a belt-and-braces
       hint for crawlers that ignore robots.txt. -->
  <meta name="robots" content="noindex, nofollow" />
  <title>Retirement Planner</title>
  <!--
    Pre-React theme bootstrap. Runs synchronously before React mounts so the
    page renders in the correct theme on the first paint — no light-theme
    flash for users who saved "dark", and no flash for OS-dark users on a
    first visit. Intentionally tiny and dependency-free; mirrors the same
    storage key the app uses (STORAGE_KEYS.scenario in src/storage.ts).
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("retirement-planner-scenario-v2");
        var theme = null;
        if (saved) {
          try { theme = (JSON.parse(saved) || {}).themeMode || null; } catch (_) {}
        }
        if (theme !== "light" && theme !== "dark") {
          // No saved scenario yet — fall back to the OS preference.
          theme = (window.matchMedia &&
                   window.matchMedia("(prefers-color-scheme: dark)").matches)
            ? "dark" : "light";
        }
        document.documentElement.dataset.theme = theme;
      } catch (_) {
        // Storage blocked / parse failure — leave default (light) styling.
      }
    })();
  </script>
  <script type="module" crossorigin src="./assets/index-DsAPa3Jx.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/recharts-BSF95eZq.js">
  <link rel="stylesheet" crossorigin href="./assets/index-BxVzIUU3.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
